<header>
  <nav class="navbar">
    <div class="container">
      <a routerLink="/home" class="brand">
        <span class="logo">🚗</span>
        <span class="brand-text">AutoMatch</span>
      </a>
      <button class="hamburger" [class.is-open]="isOpen" aria-label="Abrir menu" aria-controls="primary-navigation" [attr.aria-expanded]="isOpen" (click)="toggleMenu()">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
      <ul class="nav-links" [class.is-open]="isOpen" id="primary-navigation">
        <li><a (click)="closeMenu()" [routerLink]="['/home']" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a></li>
        <li><a (click)="closeMenu()" [routerLink]="['/about']" routerLinkActive="active">Sobre</a></li>

        <ng-container *ngIf="auth.isAuthenticated()">
          <li><a (click)="closeMenu()" [routerLink]="['/novo-match']" routerLinkActive="active">Novo match</a></li>
          <li><a (click)="closeMenu()" [routerLink]="['/profile']" routerLinkActive="active">Perfil</a></li>
          <li><a (click)="closeMenu()" [routerLink]="['/comparar']" routerLinkActive="active">Comparar</a></li>
          <li><a (click)="closeMenu()" [routerLink]="['/matches']" routerLinkActive="active">Meus matches</a></li>
          <li *ngIf="auth.isAdmin()"><a (click)="closeMenu()" [routerLink]="['/admin']" routerLinkActive="active">Admin</a></li>
          <li class="nav-user">
            <span class="user-name">{{ auth.getUser()?.fullName }}</span>
            <a (click)="logout()" class="logout-link">Sair</a>
          </li>
        </ng-container>

        <ng-container *ngIf="!auth.isAuthenticated()">
          <li><a (click)="closeMenu()" [routerLink]="['/login']" routerLinkActive="active">Entrar</a></li>
          <li><a (click)="closeMenu()" [routerLink]="['/register']" routerLinkActive="active">Cadastrar</a></li>
        </ng-container>
      </ul>
    </div>
  </nav>
  <div class="mobile-overlay" *ngIf="isOpen" (click)="closeMenu()" aria-hidden="true"></div>
</header>
