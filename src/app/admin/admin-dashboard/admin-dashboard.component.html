<main class="admin-page">
  <section class="admin-shell">
    <aside class="admin-nav">
      <div class="nav-header">
        <h2>Admin</h2>
        <p>Painel de controle</p>
      </div>
      <nav class="menu">
        <a routerLink="/admin" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }" class="menu-item">
          <span class="menu-icon">📊</span>
          <span class="menu-label">Dashboard</span>
        </a>
        <a routerLink="/admin/carros" routerLinkActive="is-active" class="menu-item">
          <span class="menu-icon">🚗</span>
          <span class="menu-label">Gerenciar Carros</span>
        </a>
        <a routerLink="/admin/usuarios" routerLinkActive="is-active" class="menu-item">
          <span class="menu-icon">👥</span>
          <span class="menu-label">Gerenciar Usuários</span>
        </a>
        <a routerLink="/home" class="menu-item">
          <span class="menu-icon">←</span>
          <span class="menu-label">Voltar ao Site</span>
        </a>
      </nav>
    </aside>

    <section class="admin-content">
      <header class="content-header">
        <h1>Dashboard</h1>
        <p>Visão geral da plataforma AutoMatch.</p>
      </header>

      <div class="stats-grid" *ngIf="!loading">
        <div class="stat-card">
          <div class="stat-icon">🚗</div>
          <div class="stat-info">
            <strong>{{ stats.totalCars }}</strong>
            <span>Carros</span>
          </div>
          <a routerLink="/admin/carros" class="stat-link">Gerenciar →</a>
        </div>

        <div class="stat-card">
          <div class="stat-icon">👥</div>
          <div class="stat-info">
            <strong>{{ stats.totalUsers }}</strong>
            <span>Usuários</span>
          </div>
          <a routerLink="/admin/usuarios" class="stat-link">Gerenciar →</a>
        </div>
      </div>

      <div class="loading" *ngIf="loading">Carregando...</div>
    </section>
  </section>
</main>
