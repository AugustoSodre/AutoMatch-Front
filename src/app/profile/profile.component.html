<main class="profile-page">
  <section class="profile-panel">
    <h1>Editar Perfil</h1>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="fields">
        <label class="field">
          <span>Nome completo</span>
          <input type="text" formControlName="fullName" placeholder="Seu nome completo" />
        </label>

        <label class="field">
          <span>Email</span>
          <input type="email" formControlName="email" placeholder="you@exemplo.com" />
        </label>

        <label class="field">
          <span>Senha</span>
          <input type="password" formControlName="password" placeholder="Sua senha" />
        </label>

        <label class="field">
          <span>Estado</span>
          <input type="text" formControlName="state" placeholder="Ex.: São Paulo" />
        </label>
      </div>

      <div class="actions">
        <button type="submit" class="save-button">Salvar Alterações</button>
        <a routerLink="/home" class="cancel-link">Cancelar</a>
      </div>
    </form>
  </section>
</main>
