<main class="profile-page">
  <section class="profile-panel">
    <h1>Editar Perfil</h1>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="auth-error" *ngIf="error">{{ error }}</div>
      <div class="fields">
        <label class="field">
          <span>Nome</span>
          <input type="text" formControlName="firstName" placeholder="Seu nome" />
        </label>

        <label class="field">
          <span>Sobrenome</span>
          <input type="text" formControlName="surname" placeholder="Seu sobrenome" />
        </label>

        <label class="field">
          <span>Email</span>
          <input type="email" formControlName="email" placeholder="you@exemplo.com" />
        </label>

        <label class="field">
          <span>Senha</span>
          <input type="password" formControlName="password" placeholder="Sua senha" />
        </label>
      </div>

      <div class="actions">
        <app-shared-button variant="primary" type="submit" [disabled]="loading">Salvar Alterações</app-shared-button>
        <a routerLink="/inicio" class="cancel-link">Cancelar</a>
      </div>
    </form>
  </section>
</main>
