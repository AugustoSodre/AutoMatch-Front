<main class="account-hub-page">
  <section class="account-hub-shell">
    <aside class="account-nav">
      <div class="profile-card">
        <button type="button" class="avatar-button" aria-label="Upload profile photo" [disabled]="avatarLoading" (click)="avatarInput.click()">
          <ng-container *ngIf="avatarPreview; else avatarFallback">
            <img class="avatar-image" [src]="avatarPreview" alt="Foto do perfil" />
          </ng-container>
          <ng-template #avatarFallback>
            <span class="avatar-placeholder">{{ displayName.charAt(0) || 'U' }}</span>
          </ng-template>
          <span class="upload-hint">Upload</span>
        </button>
        <input #avatarInput type="file" accept="image/*" class="avatar-input" (change)="onAvatarSelected($event)" />
        <div class="profile-meta">
          <h2>{{ displayName }}</h2>
          <p>{{ displayUsername }}</p>
        </div>
      </div>

      <nav class="menu" aria-label="Menu da conta">
        <a
          *ngFor="let item of menuItems"
          [routerLink]="item.route"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="menu-item"
          [class.is-active]="item.active"
        >
          <span class="menu-icon" aria-hidden="true">{{ item.icon }}</span>
          <span class="menu-label">{{ item.label }}</span>
        </a>
      </nav>
    </aside>

    <section class="account-content">
      <header class="content-header">
        <h1>Informações Pessoais</h1>
        <p>Atualize seus dados de acesso e informações básicas da sua conta AutoMatch.</p>
      </header>

      <p class="auth-error" *ngIf="error">{{ error }}</p>

      <form class="account-form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <div class="form-grid two-column">
          <label class="field">
            <span>Nome</span>
            <input type="text" formControlName="firstName" placeholder="Seu nome" />
          </label>

          <label class="field">
            <span>Sobrenome</span>
            <input type="text" formControlName="surname" placeholder="Seu sobrenome" />
          </label>
        </div>

        <div class="form-grid two-column">
          <label class="field">
            <span>Email</span>
            <input type="email" formControlName="email" placeholder="you@exemplo.com" />
          </label>

          <label class="field">
            <span>Username</span>
            <input type="text" formControlName="username" placeholder="@seuusuario" />
          </label>
        </div>

        <div class="form-actions">
          <a routerLink="/inicio" class="cancel-link">Cancelar</a>
          <app-shared-button variant="primary" type="submit" [disabled]="loading">Salvar Alterações</app-shared-button>
        </div>
      </form>
    </section>
  </section>
</main>
