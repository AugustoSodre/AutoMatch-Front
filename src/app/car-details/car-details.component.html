<main class="car-details-page">
  <ng-container *ngIf="car$ | async as car; else loading">
    <section class="hero container">
      <div class="hero-text">
        <span class="subtitle">{{ car.category }}</span>
        <h1>{{ car.name }}</h1>
        <p class="price">{{ formatPrice(car.price) }}</p>
        <p class="meta">{{ car.year }}</p>
      </div>

      <div class="hero-gallery">
        <img class="main-image" [src]="car.images.main" [alt]="car.name" />
        <div class="thumbnails">
          <img *ngFor="let thumb of car.images.thumbnails; trackBy: trackByIndex" [src]="thumb" [alt]="car.name" />
        </div>
      </div>
    </section>

    <section class="details container">
      <div class="details-card">
        <h2>Ficha Técnica</h2>
        <div class="detail-list">
          <div class="detail-item" *ngFor="let item of buildTechnicalDetails(car); trackBy: trackByIndex">
            <span class="label">{{ item.label }}</span>
            <span class="value">{{ item.value }}</span>
          </div>
        </div>
      </div>

      <div class="details-card">
        <h2>Custo</h2>
        <div class="detail-list">
          <div class="detail-item" *ngFor="let item of buildCostDetails(car); trackBy: trackByIndex">
            <span class="label">{{ item.label }}</span>
            <span class="value">{{ item.value }}</span>
          </div>
        </div>
      </div>
    </section>

    <section class="equipment container">
      <h2>Equipamentos:</h2>
      <div class="equipment-grid">
        <p class="equipment-item" *ngFor="let item of car.features; trackBy: trackByIndex">- {{ item }}</p>
      </div>
    </section>
  </ng-container>

  <ng-template #loading>
    <section class="hero container">
      <p class="loading-text">Carregando...</p>
    </section>
  </ng-template>
</main>
